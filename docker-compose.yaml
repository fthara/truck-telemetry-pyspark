services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: truck-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/workspace/apps/api

  postgres:
    image: postgres:16
    container_name: truck-postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: